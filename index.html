<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>裂縫偵測系統</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600;700&family=Noto+Sans+TC:wght@300;400;700&display=swap');

  :root {
    --bg: #0a0c0f;
    --border: #1e2530;
    --accent: #00e5ff;
    --accent2: #ff3d57;
    --warn: #ffb300;
    --success: #00e676;
    --text: #e8edf2;
    --muted: #4a5568;
    --panel: rgba(16,20,28,0.95);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── API Key Modal ── */
  .modal-bg {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(10,12,15,0.97);
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .modal-bg.hidden { display: none; }
  .modal {
    background: #111418;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 22px;
    width: 100%; max-width: 380px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .modal-logo {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.4rem; font-weight: 700;
    letter-spacing: 4px; color: var(--accent);
    text-align: center;
  }
  .modal-desc {
    font-size: 0.8rem; color: var(--muted);
    line-height: 1.7; text-align: center;
  }
  .modal-desc a { color: var(--accent); text-decoration: none; }
  .input-wrap { position: relative; }
  .input-wrap input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 13px 44px 13px 14px;
    color: var(--text);
    font-size: 0.85rem;
    font-family: monospace;
    outline: none;
    transition: border-color .2s;
  }
  .input-wrap input:focus { border-color: var(--accent); }
  .input-wrap input::placeholder { color: var(--muted); font-size: 0.75rem; font-family: 'Noto Sans TC', sans-serif; }
  .btn-eye {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 1rem; padding: 4px;
  }
  .btn-primary {
    background: var(--accent); color: #000;
    border: none; border-radius: 8px; padding: 14px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase;
    cursor: pointer; width: 100%;
    transition: opacity .2s;
  }
  .btn-primary:active { opacity: .8; }
  .key-note {
    font-size: 0.68rem; color: var(--muted);
    text-align: center; line-height: 1.6;
  }
  .err-msg { font-size: .75rem; color: var(--accent2); text-align: center; display: none; }

  /* ── Header ── */
  .header {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px 10px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    backdrop-filter: blur(12px);
    flex-shrink: 0;
  }
  .logo {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.2rem; font-weight: 700;
    letter-spacing: 3px; color: var(--accent);
  }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--success); box-shadow: 0 0 8px var(--success);
    animation: blink 2s infinite;
  }
  .status-dot.error { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); animation: none; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
  .btn-key {
    background: none; border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 10px;
    color: var(--muted); font-size: 0.7rem;
    cursor: pointer; letter-spacing: 1px;
    transition: border-color .2s, color .2s;
  }
  .btn-key:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Camera ── */
  .camera-wrap {
    position: relative; z-index: 5;
    flex: 1; min-height: 0;
    background: #000;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  #video {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
  }
  #canvasOverlay {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    mix-blend-mode: screen;
  }
  .scan-frame {
    position: absolute;
    width: min(75vw,300px); height: min(75vw,300px);
    pointer-events: none; z-index: 20;
    display: none;
  }
  .scan-frame.active { display: block; }
  .scan-frame::before,.scan-frame::after,.scan-frame .c::before,.scan-frame .c::after {
    content:''; position:absolute;
    width:22px; height:22px;
    border-color:var(--accent); border-style:solid;
  }
  .scan-frame::before  { top:0; left:0;   border-width:2px 0 0 2px; }
  .scan-frame::after   { top:0; right:0;  border-width:2px 2px 0 0; }
  .scan-frame .c::before { bottom:0; left:0;  border-width:0 0 2px 2px; }
  .scan-frame .c::after  { bottom:0; right:0; border-width:0 2px 2px 0; }
  .scan-line {
    position:absolute; left:0; right:0; height:2px;
    background:linear-gradient(90deg,transparent,var(--accent),transparent);
    box-shadow:0 0 10px var(--accent);
    animation:scanMove 2.5s ease-in-out infinite;
  }
  @keyframes scanMove { 0%{top:0;opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{top:100%;opacity:0} }

  .idle-hint {
    color: var(--muted); text-align: center;
    font-size: 0.8rem; letter-spacing: 1px;
    z-index: 10; pointer-events: none;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
  }
  .idle-hint .icon { font-size: 2.8rem; opacity: .4; }

  .result-badge {
    position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
    padding: 6px 18px; border-radius: 4px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.95rem; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    z-index: 30; display: none;
    backdrop-filter: blur(8px); border: 1px solid currentColor;
    white-space: nowrap;
  }
  .result-badge.crack { color:var(--accent2); background:rgba(255,61,87,.15); display:block; }
  .result-badge.safe  { color:var(--success);  background:rgba(0,230,118,.12); display:block; }
  .result-badge.warn  { color:var(--warn);     background:rgba(255,179,0,.12); display:block; }

  .analyzing-overlay {
    position:absolute; inset:0;
    background:rgba(10,12,15,.75);
    backdrop-filter:blur(4px);
    z-index:50; display:none;
    flex-direction:column; align-items:center; justify-content:center; gap:14px;
  }
  .analyzing-overlay.show { display:flex; }
  .spinner { width:44px; height:44px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .analyzing-text { font-family:'Rajdhani',sans-serif; font-size:.9rem; letter-spacing:3px; text-transform:uppercase; color:var(--accent); }

  /* ── Bottom ── */
  .bottom {
    position: relative; z-index: 10;
    background: var(--panel); backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    padding: 14px 16px 22px; flex-shrink: 0;
  }
  .metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:14px; }
  .metric { background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:6px; padding:9px 6px; text-align:center; }
  .metric-val { font-family:'Rajdhani',sans-serif; font-size:1.3rem; font-weight:700; color:var(--accent); line-height:1; }
  .metric-val.danger { color:var(--accent2); }
  .metric-val.warn   { color:var(--warn); }
  .metric-label { font-size:.62rem; color:var(--muted); margin-top:3px; letter-spacing:1px; text-transform:uppercase; }

  .btn-row { display:grid; grid-template-columns:1fr auto; gap:10px; align-items:center; }
  .btn-capture {
    background:var(--accent); color:#000;
    border:none; border-radius:8px; padding:13px;
    font-family:'Rajdhani',sans-serif; font-size:.95rem; font-weight:700;
    letter-spacing:3px; text-transform:uppercase; cursor:pointer;
    box-shadow:0 0 18px rgba(0,229,255,.3);
    transition:transform .1s, opacity .2s;
  }
  .btn-capture:active { transform:scale(.97); }
  .btn-capture:disabled { opacity:.35; cursor:not-allowed; box-shadow:none; }
  .btn-auto {
    width:48px; height:48px; border-radius:8px;
    border:1px solid var(--border); background:rgba(255,255,255,0.04);
    color:var(--text); cursor:pointer; font-size:1.1rem;
    display:flex; align-items:center; justify-content:center;
    transition:border-color .2s, background .2s;
  }
  .btn-auto.on { border-color:var(--accent); background:rgba(0,229,255,.1); }

  .log-title { font-size:.62rem; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin:12px 0 5px; }
  .log-list { max-height:60px; overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
  .log-item { font-size:.7rem; color:var(--muted); padding:2px 0; display:flex; gap:8px; border-bottom:1px solid rgba(255,255,255,.03); animation:fadeIn .3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(3px)} to{opacity:1} }
  .log-item .ts { color:var(--accent); font-family:'Rajdhani',sans-serif; flex-shrink:0; }
  .log-item.err .msg { color:var(--accent2); }
  .log-item.ok  .msg { color:var(--success); }
  .log-item.wrn .msg { color:var(--warn); }
</style>
</head>
<body>

<!-- ── API Key Modal ── -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-logo">🔍 CRACKDET</div>
    <div class="modal-desc">
      請輸入您的 <strong style="color:var(--accent)">Anthropic API Key</strong><br>
      金鑰僅存於本機瀏覽器，不外傳<br><br>
      尚無 API Key？→ <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a> 免費申請
    </div>
    <div class="input-wrap">
      <input type="password" id="apiKeyInput" placeholder="sk-ant-api03-xxxxxxxx" autocomplete="off" spellcheck="false">
      <button class="btn-eye" id="btnEye">👁</button>
    </div>
    <div class="err-msg" id="errMsg">格式錯誤，Key 應以 sk-ant 開頭</div>
    <button class="btn-primary" id="btnSaveKey">確認並啟動相機</button>
    <div class="key-note">💡 每次分析約消耗 300~500 tokens（&lt; US$0.01）</div>
  </div>
</div>

<!-- ── Header ── -->
<header class="header">
  <div class="logo">⚡ CRACKDET</div>
  <div class="header-right">
    <button class="btn-key" id="btnShowKey">🔑 API Key</button>
    <div class="status-dot" id="statusDot"></div>
  </div>
</header>

<!-- ── Camera ── -->
<div class="camera-wrap" id="cameraWrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvasOverlay"></canvas>
  <div class="idle-hint" id="idleHint">
    <div class="icon">📷</div>
    <span>設定 API Key 後啟動相機</span>
  </div>
  <div class="scan-frame" id="scanFrame"><div class="c"></div><div class="scan-line"></div></div>
  <div class="result-badge" id="resultBadge"></div>
  <div class="analyzing-overlay" id="analyzingOverlay">
    <div class="spinner"></div>
    <div class="analyzing-text">AI 分析中...</div>
  </div>
</div>

<!-- ── Bottom ── -->
<div class="bottom">
  <div class="metrics">
    <div class="metric"><div class="metric-val" id="mConf">--</div><div class="metric-label">裂縫信心</div></div>
    <div class="metric"><div class="metric-val" id="mSev">--</div><div class="metric-label">嚴重程度</div></div>
    <div class="metric"><div class="metric-val" id="mCnt">0</div><div class="metric-label">偵測次數</div></div>
  </div>
  <div class="btn-row">
    <button class="btn-capture" id="btnCapture" disabled>拍照分析</button>
    <button class="btn-auto" id="btnAuto">⚡</button>
  </div>
  <div class="log-title">分析紀錄</div>
  <div class="log-list" id="logList"></div>
</div>

<canvas id="captureCanvas" style="display:none"></canvas>

<script>
let apiKey = localStorage.getItem('crackdet_key') || '';
let stream = null, autoTimer = null, autoOn = false, analyzing = false, count = 0, cameraReady = false;

// ── Init ──────────────────────────────────────────────
window.addEventListener('load', () => {
  resizeCanvas();
  if (apiKey) {
    document.getElementById('modalBg').classList.add('hidden');
    document.getElementById('apiKeyInput').value = apiKey;
    startCamera();
  } else {
    addLog('wrn', '請先輸入 API Key');
  }
});
window.addEventListener('resize', resizeCanvas);
function resizeCanvas() {
  const wrap = document.getElementById('cameraWrap');
  const cv = document.getElementById('canvasOverlay');
  cv.width = wrap.clientWidth; cv.height = wrap.clientHeight;
}

// ── Modal ──────────────────────────────────────────────
document.getElementById('btnShowKey').addEventListener('click', () => document.getElementById('modalBg').classList.remove('hidden'));
document.getElementById('btnEye').addEventListener('click', () => {
  const i = document.getElementById('apiKeyInput');
  i.type = i.type === 'password' ? 'text' : 'password';
});
document.getElementById('apiKeyInput').addEventListener('keydown', e => { if (e.key === 'Enter') saveKey(); });
document.getElementById('btnSaveKey').addEventListener('click', saveKey);

function saveKey() {
  const val = document.getElementById('apiKeyInput').value.trim();
  const errEl = document.getElementById('errMsg');
  if (!val.startsWith('sk-ant')) { errEl.style.display = 'block'; return; }
  errEl.style.display = 'none';
  apiKey = val;
  localStorage.setItem('crackdet_key', apiKey);
  document.getElementById('modalBg').classList.add('hidden');
  addLog('ok', 'API Key 已儲存');
  if (!cameraReady) startCamera();
}

// ── Camera ────────────────────────────────────────────
async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' } }, audio: false
    });
    const video = document.getElementById('video');
    video.srcObject = stream;
    await video.play();
    cameraReady = true;
    document.getElementById('idleHint').style.display = 'none';
    document.getElementById('scanFrame').classList.add('active');
    document.getElementById('btnCapture').disabled = false;
    addLog('ok', '相機啟動成功');
  } catch(e) {
    document.getElementById('statusDot').classList.add('error');
    addLog('err', '相機失敗：' + e.message);
  }
}

// ── Capture ───────────────────────────────────────────
document.getElementById('btnCapture').addEventListener('click', captureAndAnalyze);
document.getElementById('btnAuto').addEventListener('click', () => {
  autoOn = !autoOn;
  document.getElementById('btnAuto').classList.toggle('on', autoOn);
  if (autoOn) {
    addLog('wrn', '自動偵測啟動 (每6秒)');
    captureAndAnalyze();
    autoTimer = setInterval(captureAndAnalyze, 6000);
  } else {
    clearInterval(autoTimer);
    document.getElementById('btnCapture').disabled = false;
    addLog('ok', '自動偵測停止');
  }
});

async function captureAndAnalyze() {
  if (analyzing) return;
  if (!apiKey) { document.getElementById('modalBg').classList.remove('hidden'); return; }
  if (!stream) { addLog('err', '相機尚未啟動'); return; }

  analyzing = true;
  document.getElementById('btnCapture').disabled = true;
  document.getElementById('analyzingOverlay').classList.add('show');
  document.getElementById('resultBadge').className = 'result-badge';

  const video = document.getElementById('video');
  const cc = document.getElementById('captureCanvas');
  cc.width = video.videoWidth || 640; cc.height = video.videoHeight || 480;
  cc.getContext('2d').drawImage(video, 0, 0);
  const b64 = cc.toDataURL('image/jpeg', 0.85).split(',')[1];

  try {
    const result = await callAPI(b64);
    showResult(result);
    document.getElementById('statusDot').classList.remove('error');
  } catch(e) {
    document.getElementById('statusDot').classList.add('error');
    addLog('err', e.message);
  } finally {
    analyzing = false;
    if (!autoOn) document.getElementById('btnCapture').disabled = false;
    document.getElementById('analyzingOverlay').classList.remove('show');
  }
}

// ── API ───────────────────────────────────────────────
async function callAPI(b64) {
  let res;
  try {
    res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-opus-4-5',
        max_tokens: 400,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: b64 } },
            { type: 'text', text: '你是建築結構安全AI。分析此圖有無牆壁裂縫，只回傳純JSON（不含markdown格式）：\n{"hasCrack":bool,"confidence":0到100整數,"severity":"無|輕微|中度|嚴重","crackType":"無裂縫|髮絲裂縫|結構裂縫|剪力裂縫|沉陷裂縫","description":"25字內中文說明","recommendation":"10字內中文建議"}' }
          ]
        }]
      })
    });
  } catch(fetchErr) {
    throw new Error('網路連線失敗，請確認網路狀態');
  }

  if (res.status === 401) throw new Error('API Key 無效，請重新設定');
  if (res.status === 429) throw new Error('請求過於頻繁，請稍後再試');
  if (!res.ok) {
    const errBody = await res.json().catch(() => ({}));
    throw new Error('API錯誤 ' + res.status + '：' + (errBody?.error?.message || '未知錯誤'));
  }

  const data = await res.json();
  const text = data.content.map(b => b.text || '').join('').replace(/```json|```/g,'').trim();
  try {
    return JSON.parse(text);
  } catch {
    throw new Error('AI 回應解析失敗，請重試');
  }
}

// ── Result ────────────────────────────────────────────
function showResult(r) {
  count++;
  document.getElementById('mCnt').textContent = count;

  const conf = r.confidence ?? 0;
  const mConf = document.getElementById('mConf');
  mConf.textContent = conf + '%';
  mConf.className = 'metric-val' + (conf > 70 ? ' danger' : conf > 40 ? ' warn' : '');

  const mSev = document.getElementById('mSev');
  mSev.textContent = r.severity || '--';
  mSev.className = 'metric-val' + (r.severity==='嚴重'?' danger':r.severity==='中度'?' warn':'');

  const badge = document.getElementById('resultBadge');
  if (r.hasCrack) {
    if (r.severity==='嚴重'||r.severity==='中度') {
      badge.textContent = '⚠ ' + r.severity + '裂縫';
      badge.className = 'result-badge crack';
      addLog('err', `[${r.crackType}] ${r.description} → ${r.recommendation}`);
    } else {
      badge.textContent = '△ 輕微裂縫';
      badge.className = 'result-badge warn';
      addLog('wrn', `[${r.crackType}] ${r.description} → ${r.recommendation}`);
    }
    drawOverlay(conf);
  } else {
    badge.textContent = '✓ 牆面正常';
    badge.className = 'result-badge safe';
    clearOverlay();
    addLog('ok', `牆面正常 (信心 ${conf}%)`);
  }
}

function drawOverlay(intensity) {
  const cv = document.getElementById('canvasOverlay');
  const ctx = cv.getContext('2d');
  ctx.clearRect(0,0,cv.width,cv.height);
  const w=cv.width, h=cv.height, a=Math.min(intensity/100,.85);
  const g = ctx.createRadialGradient(w/2,h/2,h*.15,w/2,h/2,h*.65);
  g.addColorStop(0,'rgba(255,61,87,0)');
  g.addColorStop(1,`rgba(255,61,87,${a*.4})`);
  ctx.fillStyle=g; ctx.fillRect(0,0,w,h);
  ctx.strokeStyle=`rgba(255,61,87,${a*.7})`; ctx.lineWidth=1.5;
  ctx.shadowColor='rgba(255,61,87,.9)'; ctx.shadowBlur=8;
  const n=Math.max(1,Math.floor(intensity/22));
  for(let i=0;i<n;i++){
    const s=i*139.7;
    let x=w*(0.3+0.4*Math.sin(s)), y=h*(0.15+0.5*Math.cos(s*.8));
    ctx.beginPath(); ctx.moveTo(x,y);
    for(let j=0;j<9;j++){ x+=(Math.random()-.5)*55; y+=Math.random()*28+8; ctx.lineTo(x,y); }
    ctx.stroke();
  }
  ctx.shadowBlur=0;
}
function clearOverlay() {
  const cv=document.getElementById('canvasOverlay');
  cv.getContext('2d').clearRect(0,0,cv.width,cv.height);
}

// ── Log ───────────────────────────────────────────────
function addLog(type, msg) {
  const ts = new Date().toTimeString().slice(0,8);
  const list = document.getElementById('logList');
  const el = document.createElement('div');
  el.className = `log-item ${type}`;
  el.innerHTML = `<span class="ts">${ts}</span><span class="msg">${msg}</span>`;
  list.prepend(el);
  if (list.children.length > 30) list.removeChild(list.lastChild);
}

addLog('ok', '系統就緒');
if (!apiKey) addLog('wrn', '請先設定 Anthropic API Key');
</script>
