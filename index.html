<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>壁裂AI - 真實AI版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.21.0/dist/tf.min.js"></script>
    <style>
        /* 原本的樣式保持不變...（這裡省略，複製你原本的 style 即可） */
        .mobile-frame { /* ... 原本的樣式 ... */ }
    </style>
</head>
<body class="bg-slate-950 flex items-center justify-center min-h-screen">
    <div class="mobile-frame">
        <!-- 狀態列 + Header 保持不變（複製原本的） -->

        <!-- 其他畫面也保持不變，只修改 analyzeImage 與新增載入模型 -->

        <script>
            let model = null;
            let currentStream = null;
            let capturedDataURL = null;

            // ========== 新增：載入真實AI模型 ==========
            async function loadAIModel() {
                const status = document.createElement('div');
                status.style.cssText = 'position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#0ea5e9; color:white; padding:12px 24px; border-radius:9999px; font-size:14px;';
                status.textContent = '🔄 正在載入AI模型...';
                document.body.appendChild(status);

                try {
                    // ←←←←←←←←←←←←←←←←←←←←←←←←←←←←
                    // 這裡改成你自己的 model.json 網址
                    model = await tf.loadGraphModel('https://你的網址/web_model/model.json');
                    // ←←←←←←←←←←←←←←←←←←←←←←←←←←←←
                    
                    console.log('%c✅ 真實AI模型載入成功！', 'color:#10b981; font-size:16px');
                    status.textContent = '✅ AI模型已準備好';
                    setTimeout(() => status.remove(), 1500);
                } catch (e) {
                    status.style.background = '#ef4444';
                    status.textContent = '❌ 模型載入失敗，請檢查網址';
                    console.error(e);
                }
            }

            // ========== 修改：真實AI分析 ==========
            async function analyzeImage() {
                if (!model) {
                    alert('請先等待AI模型載入完成！');
                    return;
                }
                showScreen('screen-result');

                const canvas = document.getElementById('result-canvas');
                const ctx = canvas.getContext('2d');
                const img = new Image();
                
                img.onload = async function() {
                    // 設定 canvas
                    const maxWidth = 380;
                    const ratio = img.width / img.height;
                    canvas.width = maxWidth;
                    canvas.height = maxWidth / ratio;
                    
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                    // === 真實AI推論開始 ===
                    const inputTensor = tf.browser.fromPixels(canvas)
                        .resizeNearestNeighbor([320, 320])   // 模型輸入尺寸（依你的模型調整）
                        .toFloat()
                        .div(255.0)
                        .expandDims(0);

                    const predictions = await model.executeAsync(inputTensor);
                    
                    // 假設你的模型輸出格式為：
                    // predictions[0] = boxes (4, num_boxes)
                    // predictions[1] = scores
                    // predictions[2] = classes
                    // （不同模型輸出不同，請依實際調整）
                    const boxes = await predictions[0].array();
                    const scores = await predictions[1].array();
                    const classes = await predictions[2].array();

                    // 清除 tensor 釋放記憶體
                    inputTensor.dispose();
                    predictions.forEach(p => p.dispose());

                    // 畫裂縫框（紅色）
                    ctx.strokeStyle = '#ef4444';
                    ctx.lineWidth = 5;
                    ctx.shadowColor = '#f43f5e';
                    ctx.shadowBlur = 15;

                    let crackCount = 0;
                    for (let i = 0; i < boxes[0].length; i++) {
                        if (scores[0][i] > 0.5) {   // 信心閾值可調整
                            crackCount++;
                            const [ymin, xmin, ymax, xmax] = boxes[0][i];
                            
                            const x = xmin * canvas.width;
                            const y = ymin * canvas.height;
                            const w = (xmax - xmin) * canvas.width;
                            const h = (ymax - ymin) * canvas.height;
                            
                            ctx.beginPath();
                            ctx.rect(x, y, w, h);
                            ctx.stroke();
                            
                            // 標註信心度
                            ctx.fillStyle = '#ef4444';
                            ctx.font = 'bold 14px Noto Sans TC';
                            ctx.fillText(`裂縫 ${Math.round(scores[0][i]*100)}%`, x, y - 8);
                        }
                    }

                    // 更新結果文字
                    document.getElementById('crack-details').innerHTML = `
                        <span class="font-semibold">偵測到 <span class="text-red-500">${crackCount}</span> 處裂縫</span><br>
                        信心度門檻：50% 以上
                    `;
                    document.getElementById('severity').textContent = '真實AI計算中...';
                    document.getElementById('risk-level').textContent = crackCount > 2 ? '高' : '中';
                };
                img.src = capturedDataURL;
            }

            // 其餘函數（startCameraMode、capturePhoto 等）保持不變
            // ...（複製你原本的 script 其餘部分）...

            // 初始化時自動載入模型
            window.onload = function() {
                initTailwind();
                loadAIModel();   // ← 新增這一行
                console.log('%c✅ 壁裂AI 真實AI版 已啟動！', 'color:#0ea5e9; font-size:18px');
            };
        </script>
    </div>
</body>
</html>
